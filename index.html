<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigChanger</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <a href="#" class="brand">
          <div class="brand-mark">
            <img src="logo.png" alt="BigChanger logo" />
          </div>
          <div class="brand-text">BigChanger</div>
        </a>
        <nav class="lang-switcher" aria-label="Language switcher">
            <a href="why-east-kz.html" class="vko-btn">Why East Kazakhstan</a>
            <button type="button" class="lang-btn active" data-lang="ru">RU</button>
            <button type="button" class="lang-btn" data-lang="kz">KZ</button>
            <button type="button" class="lang-btn" data-lang="en">EN</button>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <section id="content" class="content-area">
        <div class="loading-state">Загрузка...</div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-block">
          <div class="footer-title">BigChanger</div>
          <div class="footer-text">Immersive technology, tourism and media development project.</div>
        </div>

        <div class="footer-block">
          <div class="footer-title">Contact</div>
          <a class="footer-link" href="mailto:info@bigchanger.org">info@bigchanger.org</a>
          <a class="footer-link" href="tel:+77713505701">+77713505701</a>
        </div>

        <div class="footer-block">
          <div class="footer-title">Website</div>
          <a class="footer-link" href="https://bigchanger.org" target="_blank" rel="noopener noreferrer">bigchanger.org</a>
          <div class="footer-copy">© 2026 BigChanger</div>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const supportedLangs = {
      ru: {
        file: 'content-ru.html',
        htmlLang: 'ru'
      },
      kz: {
        file: 'content-kz.html',
        htmlLang: 'kk'
      },
      en: {
        file: 'content-en.html',
        htmlLang: 'en'
      }
    };
function updateVkoButton(lang) {
  const btn = document.querySelector('.vko-btn');

  if (!btn) return;

  if (lang === 'ru') btn.textContent = 'Почему ВКО';
  else if (lang === 'kz') btn.textContent = 'Неге ШҚО';
  else btn.textContent = 'Why East Kazakhstan';
}
    
    const contentEl = document.getElementById('content');
    const langButtons = document.querySelectorAll('.lang-btn');

    function setActiveLangButton(lang) {
      langButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    async function loadLanguage(lang) {
      const config = supportedLangs[lang] || supportedLangs.ru;
      updateVkoButton(lang);
      try {
        const response = await fetch(config.file, { cache: 'no-cache' });
        if (!response.ok) throw new Error('Content load failed');

        const html = await response.text();
        contentEl.innerHTML = html;

        document.documentElement.lang = config.htmlLang;
        localStorage.setItem('siteLang', lang);
        setActiveLangButton(lang);
      } catch (error) {
        contentEl.innerHTML = `
          <div class="loading-state">
            Не удалось загрузить контент языка: ${lang.toUpperCase()}
          </div>
        `;
      }
    }

    langButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        loadLanguage(btn.dataset.lang);
      });
    });

    const savedLang = localStorage.getItem('siteLang') || 'ru';
    loadLanguage(savedLang);
  </script>
</body>
</html>
